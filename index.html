<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housewarming Invitation - Saravanan & Revathi</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0a2e, #16213e, #0f3460, #1a0a2e);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 30px 15px;
        }

        /* Floating background particles */
        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Sparkle effect */
        .sparkle-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle {
            position: absolute;
            width: 4px; height: 4px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite;
            box-shadow: 0 0 6px #ffd700, 0 0 12px #ffd700;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Main Card */
        .invitation-card {
            position: relative;
            width: 520px;
            max-width: 100%;
            border-radius: 24px;
            overflow: visible;
            z-index: 10;
            animation: cardEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.8) translateY(60px);
            margin: auto;
        }

        @keyframes cardEntry {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Animated border */
        .card-border {
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: conic-gradient(
                from var(--border-angle, 0deg),
                #ff6b35, #ffd700, #ff1744, #e040fb, #ffd700, #00e676, #ffd700, #ff6b35
            );
            animation: rotateBorder 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotateBorder {
            to { --border-angle: 360deg; }
        }

        @property --border-angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .card-inner {
            position: relative;
            background: linear-gradient(160deg, #2d1b4e 0%, #1a0a2e 30%, #0d1f3c 60%, #1a0a2e 100%);
            border-radius: 24px;
            padding: 3px;
        }

        .card-content {
            background: linear-gradient(160deg, #1e0f3d 0%, #150a2e 40%, #0a1628 70%, #150a2e 100%);
            border-radius: 22px;
            padding: 40px 32px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative corner ornaments */
        .corner-ornament {
            position: absolute;
            width: 70px; height: 70px;
            opacity: 0.6;
        }

        .corner-ornament.top-left {
            top: 12px; left: 12px;
            border-top: 3px solid #ffd700;
            border-left: 3px solid #ffd700;
            border-top-left-radius: 18px;
            animation: cornerGlow 3s ease-in-out infinite;
        }

        .corner-ornament.top-right {
            top: 12px; right: 12px;
            border-top: 3px solid #ffd700;
            border-right: 3px solid #ffd700;
            border-top-right-radius: 18px;
            animation: cornerGlow 3s ease-in-out infinite 0.5s;
        }

        .corner-ornament.bottom-left {
            bottom: 12px; left: 12px;
            border-bottom: 3px solid #ffd700;
            border-left: 3px solid #ffd700;
            border-bottom-left-radius: 18px;
            animation: cornerGlow 3s ease-in-out infinite 1s;
        }

        .corner-ornament.bottom-right {
            bottom: 12px; right: 12px;
            border-bottom: 3px solid #ffd700;
            border-right: 3px solid #ffd700;
            border-bottom-right-radius: 18px;
            animation: cornerGlow 3s ease-in-out infinite 1.5s;
        }

        @keyframes cornerGlow {
            0%, 100% { opacity: 0.4; border-color: #ffd700; }
            50% { opacity: 0.9; border-color: #ffaa00; filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5)); }
        }

        /* Background glow inside card */
        .card-glow {
            position: absolute;
            width: 250px; height: 250px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        .glow-1 {
            top: -50px; left: -50px;
            background: #ff6b35;
            animation: glowPulse 6s ease-in-out infinite;
        }

        .glow-2 {
            bottom: -50px; right: -50px;
            background: #e040fb;
            animation: glowPulse 6s ease-in-out infinite 3s;
        }

        .glow-3 {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffd700;
            width: 180px; height: 180px;
            animation: glowPulseCenter 5s ease-in-out infinite 1.5s;
            opacity: 0.1;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.2); }
        }

        @keyframes glowPulseCenter {
            0%, 100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.2; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* Mandala rings */
        .mandala-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            border: 1px solid rgba(255, 215, 0, 0.03);
            border-radius: 50%;
            animation: mandalaSpin 30s linear infinite;
            pointer-events: none;
        }

        .mandala-ring:nth-child(2) {
            width: 340px; height: 340px;
            border-color: rgba(224, 64, 251, 0.03);
            animation-direction: reverse;
            animation-duration: 25s;
        }

        @keyframes mandalaSpin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Animated flowers */
        .flower {
            position: absolute;
            font-size: 14px;
            opacity: 0.3;
            animation: flowerSway 5s ease-in-out infinite;
            pointer-events: none;
        }

        .flower:nth-child(1) { top: 50px; left: 16px; animation-delay: 0s; }
        .flower:nth-child(2) { top: 50px; right: 16px; animation-delay: 1.5s; }
        .flower:nth-child(3) { bottom: 50px; left: 16px; animation-delay: 3s; }
        .flower:nth-child(4) { bottom: 50px; right: 16px; animation-delay: 0.5s; }

        @keyframes flowerSway {
            0%, 100% { transform: rotate(-10deg) scale(1); opacity: 0.2; }
            50% { transform: rotate(10deg) scale(1.2); opacity: 0.5; }
        }

        /* Content styles */
        .inv-content {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        .om-symbol {
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 6px;
            animation: omGlow 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            display: inline-block;
        }

        @keyframes omGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); transform: scale(1); }
            50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.3); transform: scale(1.05); }
        }

        .subtitle-top {
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ffd700;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 0.6s;
            margin-bottom: 10px;
        }

        .house-icon {
            font-size: 34px;
            display: inline-block;
            margin-bottom: 8px;
            animation: houseBounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 12px rgba(255, 150, 0, 0.4));
        }

        @keyframes houseBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }

        .main-title {
            font-family: 'Great Vibes', cursive;
            font-size: 46px;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ff8c00, #ffd700);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 4s ease-in-out infinite, fadeSlideUp 1s ease forwards 0.8s;
            opacity: 0;
            margin-bottom: 4px;
            filter: drop-shadow(0 2px 10px rgba(255, 215, 0, 0.3));
        }

        @keyframes shimmerText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .housewarming-text {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: #e0a0ff;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1s;
            margin-bottom: 22px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 22px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1.1s;
        }

        .divider-line {
            height: 1px;
            width: 50px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }

        .divider-diamond {
            width: 7px; height: 7px;
            background: #ffd700;
            transform: rotate(45deg);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: diamondPulse 2s ease-in-out infinite;
        }

        @keyframes diamondPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
        }

        .invited-label {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1.2s;
            margin-bottom: 10px;
        }

        .host-names {
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1.4s;
            margin-bottom: 24px;
        }

        .host-name {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .host-ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #ffd700;
            display: block;
            margin: 0;
        }

        /* Rangoli decoration */
        .rangoli {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 22px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1.5s;
        }

        .rangoli-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            animation: rangoliPop 2s ease-in-out infinite;
        }

        .rangoli-dot:nth-child(1) { background: #ff1744; animation-delay: 0s; }
        .rangoli-dot:nth-child(2) { background: #ff9100; animation-delay: 0.15s; }
        .rangoli-dot:nth-child(3) { background: #ffd600; animation-delay: 0.3s; }
        .rangoli-dot:nth-child(4) { background: #00e676; animation-delay: 0.45s; }
        .rangoli-dot:nth-child(5) { background: #2979ff; animation-delay: 0.6s; }
        .rangoli-dot:nth-child(6) { background: #e040fb; animation-delay: 0.75s; }
        .rangoli-dot:nth-child(7) { background: #ff1744; animation-delay: 0.9s; }
        .rangoli-dot:nth-child(8) { background: #ff9100; animation-delay: 1.05s; }
        .rangoli-dot:nth-child(9) { background: #ffd600; animation-delay: 1.2s; }

        @keyframes rangoliPop {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.6); opacity: 1; box-shadow: 0 0 8px currentColor; }
        }

        /* Details section */
        .details-section {
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1.6s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 215, 0, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 14px;
            transition: all 0.4s ease;
        }

        .detail-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.1);
        }

        .detail-icon {
            font-size: 20px;
            width: 38px; height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
            flex-shrink: 0;
        }

        .detail-text {
            text-align: left;
        }

        .detail-label {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 1px;
        }

        .detail-value {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
        }

        .detail-value.date-highlight {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Address */
        .address-section {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 1.8s;
        }

        .address-label {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 6px;
        }

        .address-text {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
        }

        .address-text .highlight {
            color: #ffd700;
            font-weight: 700;
        }

        /* Footer message */
        .footer-message {
            margin-top: 22px;
            padding-bottom: 4px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease forwards 2s;
        }

        .footer-line {
            font-family: 'Great Vibes', cursive;
            font-size: 20px;
            color: #e0a0ff;
            margin-bottom: 4px;
        }

        .footer-sub {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 8px; height: 8px;
            top: -10px;
            animation: confettiFall linear infinite;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 540px) {
            body {
                padding: 20px 10px;
            }

            .card-content {
                padding: 30px 20px;
            }

            .main-title {
                font-size: 38px;
            }

            .host-name {
                font-size: 20px;
            }

            .host-ampersand {
                font-size: 24px;
            }

            .housewarming-text {
                font-size: 11px;
                letter-spacing: 4px;
            }

            .corner-ornament {
                width: 45px; height: 45px;
            }

            .detail-item {
                padding: 10px 12px;
                gap: 10px;
            }

            .detail-icon {
                width: 34px; height: 34px;
                font-size: 18px;
            }

            .detail-value {
                font-size: 13px;
            }

            .om-symbol {
                font-size: 26px;
            }

            .house-icon {
                font-size: 28px;
            }

            .mandala-ring {
                width: 300px; height: 300px;
            }

            .mandala-ring:nth-child(2) {
                width: 260px; height: 260px;
            }

            .footer-line {
                font-size: 18px;
            }
        }

        @media (max-height: 700px) {
            body {
                padding: 15px 10px;
            }

            .card-content {
                padding: 28px 24px;
            }

            .main-title {
                font-size: 38px;
            }

            .om-symbol {
                font-size: 26px;
                margin-bottom: 4px;
            }

            .house-icon {
                font-size: 28px;
                margin-bottom: 4px;
            }

            .subtitle-top {
                margin-bottom: 6px;
            }

            .housewarming-text {
                margin-bottom: 16px;
            }

            .divider {
                margin-bottom: 16px;
            }

            .host-names {
                margin-bottom: 18px;
            }

            .rangoli {
                margin-bottom: 16px;
            }

            .address-section {
                margin-top: 16px;
                padding-top: 14px;
            }

            .footer-message {
                margin-top: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Particles -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- Sparkles -->
    <div class="sparkle-container" id="sparkleContainer"></div>

    <!-- Confetti -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Main Invitation Card -->
    <div class="invitation-card">
        <div class="card-border"></div>
        <div class="card-inner">
            <div class="card-content">

                <!-- Glows -->
                <div class="card-glow glow-1"></div>
                <div class="card-glow glow-2"></div>
                <div class="card-glow glow-3"></div>

                <!-- Mandala rings -->
                <div class="mandala-ring"></div>
                <div class="mandala-ring"></div>

                <!-- Corner ornaments -->
                <div class="corner-ornament top-left"></div>
                <div class="corner-ornament top-right"></div>
                <div class="corner-ornament bottom-left"></div>
                <div class="corner-ornament bottom-right"></div>

                <!-- Floating flowers -->
                <div class="flower">🌸</div>
                <div class="flower">🌺</div>
                <div class="flower">🌸</div>
                <div class="flower">🌺</div>

                <!-- Content -->
                <div class="inv-content">

                    <div class="om-symbol">🙏</div>

                    <div class="subtitle-top">You Are Cordially Invited</div>

                    <div class="house-icon">🏠</div>

                    <div class="main-title">Housewarming</div>

                    <div class="housewarming-text">Griha Pravesham</div>

                    <div class="divider">
                        <div class="divider-line"></div>
                        <div class="divider-diamond"></div>
                        <div class="divider-line"></div>
                    </div>

                    <div class="invited-label">Warmly welcomed by</div>

                    <div class="host-names">
                        <div class="host-name">R. Saravanan</div>
                        <span class="host-ampersand">&</span>
                        <div class="host-name">S. Revathi</div>
                    </div>

                    <div class="rangoli">
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                        <div class="rangoli-dot"></div>
                    </div>

                    <div class="details-section">
                        <div class="detail-item">
                            <div class="detail-icon">📅</div>
                            <div class="detail-text">
                                <div class="detail-label">Date</div>
                                <div class="detail-value date-highlight">23 April 2026</div>
                                <div class="detail-label" style="margin-top:1px;">Thursday</div>
                            </div>
                        </div>

                        <div class="detail-item">
                            <div class="detail-icon">🕐</div>
                            <div class="detail-text">
                                <div class="detail-label">Time</div>
                                <div class="detail-value">Morning 7:30 – 9:00</div>
                            </div>
                        </div>
                    </div>

                    <div class="address-section">
                        <div class="address-label">📍 Venue</div>
                        <div class="address-text">
                            <span class="highlight">No 23,</span> Sree Lakshmi Nagar,<br>
                            Sevvapet, Thiruvallur.
                        </div>
                    </div>

                    <div class="footer-message">
                        <div class="footer-line">Your Presence is our Blessing!</div>
                        <div class="footer-sub">We eagerly await your gracious presence</div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Create background particles
        function createParticles() {
            const container = document.getElementById('bgParticles');
            const colors = ['#ffd700', '#ff6b35', '#e040fb', '#00e676', '#ff1744', '#2979ff', '#ff9100'];

            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 5 + 2;
                particle.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    box-shadow: 0 0 ${size * 2}px ${color};
                    animation-duration: ${Math.random() * 15 + 12}s;
                    animation-delay: ${Math.random() * 10}s;
                `;
                container.appendChild(particle);
            }
        }

        // Create sparkles
        function createSparkles() {
            const container = document.getElementById('sparkleContainer');

            for (let i = 0; i < 15; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation-delay: ${Math.random() * 3}s;
                    animation-duration: ${Math.random() * 2 + 1.5}s;
                `;
                container.appendChild(sparkle);
            }
        }

        // Create confetti
        function createConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ffd700', '#ff1744', '#00e676', '#2979ff', '#e040fb', '#ff9100', '#ffd600'];
            const shapes = ['circle', 'square'];

            function dropConfetti() {
                for (let i = 0; i < 2; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    const size = Math.random() * 7 + 4;
                    confetti.style.cssText = `
                        left: ${Math.random() * 100}%;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        border-radius: ${shape === 'circle' ? '50%' : '2px'};
                        animation-duration: ${Math.random() * 4 + 5}s;
                        animation-delay: ${Math.random() * 0.5}s;
                        opacity: 0.6;
                    `;
                    container.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 10000);
                }
            }

            // Initial burst
            setTimeout(() => {
                for (let i = 0; i < 30; i++) {
                    setTimeout(() => dropConfetti(), i * 60);
                }
            }, 1500);

            // Ongoing subtle confetti
            setInterval(() => dropConfetti(), 3000);
        }

        // Initialize
        createParticles();
        createSparkles();
        createConfetti();
    </script>

</body>
</html>
